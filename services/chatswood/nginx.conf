events {}

http {
    server {
        listen 4001;  

        location / {
            
            # Mock X-Frame-Options header to allow framing
            add_header X-Frame-Options "ALLOW-FROM http://localhost:3001";
            add_header Content-Security-Policy "frame-ancestors http://localhost:3001";

            proxy_pass http://rails:3000/;
            proxy_set_header Host $host:4001;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
